body:
  text: 總論對口發背不拘偏正只謂形色色忌晦滯貴淡紅明潤形忌歪邪平塌要尖圓高突所以高為陽下為陰紅為陽白為陰有肌膚受寒毒雖高聳而亦白者須用柴葛解肌或時當寒甚用淨蘇葉溫解使之重汗俾邪從汗解若痛在筋骨外不現形肉色如故兩脈或弦硬細緊沉伏細滑則為流注須用蒼陳朴草蘇葉不效再用麻黃薑桂附子以解之麻黃不拘分量數分起至二錢為止有干鶴膝小腿不但不腫脹並其上大肉盡去膝轉看得極大麻黃一服即用三錢對口不拘左右以升陽火為主右初起柴胡川芎可稍緩即用升麻左初起升麻可稍緩且先用柴葛解肌湯若自左腫之右自右腫之初一服升柴川芎並用桔梗不拘左右用錢外至錢半為止使之載諸藥而上浮凡耳後腦骨中間軟堂正中必用獨活以提腎毒對口在頭頭為諸陽之首雖不高聳亦不以陰論止重用發散間有時值嚴寒無汗不解用麻黃三五分炒黑而桂附等藥不用發背亦然發背並不宜重用發散倘至大潰之後亦清補者多對乳以上用桔梗對乳以下不用對口右升麻左柴胡乃其君也若火勢炎甚身熱如炙痛楚非常川芎不用經云川芎佐清陽而升頭角火炎者宜戒火熱大痛極紅而老倘升陽散火無效一面重加升麻一面加大黃一二錢謂之將軍定痛散發背若大痛楚亦用定痛散毒有遊紅嫩紅散腳紅紅而帶紫如豬肝色重則用青皮柴胡以疏肝氣輕則用柴胡白蒺藜丹皮以平之遊紅系絳紅色亦帶紫是血分稍虧陰火上發輕則用玄參二三錢如夜加痛楚發熱則用生地二三錢以滋陰非此不可擅用恐導邪入腎當歸去瘀生新新會皮和中補胃二味人稱外科勝藥病未退切不可擅用能導邪入胃乳香沒藥能和氣血亦能損胃胃弱者亦戒至麻黃薑桂説之已詳大寒如知柏芩連用亦甚少非身熱不退不用黃芩非干惡神情煩躁身熱如爐不用黃連非口中大苦舌苔焦黃而作渴不用知母小便短赤眼睛淚熱方用黃柏鹽水炒脾善唇滋潤肝善身輕便肺善聲音響心善精神爽腎善水稀長是謂五善更有七惡一惡神昏憒二惡腰身強三惡形消瘦四惡皮膚稿五惡成消渴六惡身浮腫七惡瘡倒陷外科正宗善惡論患處梗實如同負重形色晦暗歪邪平塌隱然有黑色在肌肉間是毒藏於胃不治何則胃主肌肉肺主皮毛且肺屬金胃屬土土為金母煩躁而指頭不紅肝病神昏心病口中無味干吊惡而飲食不貪脾病肌膚不潤毛髮乾枯而多痰肺病小水短赤骨節疼痛夜不成眠飲食不消大便不實腎病毒色如豬肝無膿者死潰而不爛最忌起葡桃之肉腫毒亦腫者佳肉腫毒不腫者死去腐生新形如石榴子者佳腐肉已脫而有紅絲絲於其上者死新肉如板片不進食者死又有毒已潰爛根腳尚不清楚膿勢亦不湧出飲食不貪欲攻而毒已潰爛身軀已弱欲補而根腳不清膿不湧食不貪肺胃邪不退攻補兩難經云攻則死補亦亡謂和六腑最為良更有新肉已滿外口亦閉按之不實如皮袋狀不治凡至根腳清痛減膿雖未湧不妨少用生耆以佐膿根腳清毒軟痛止急用炙黃耆山藥合八珍湯扶正卻邪有受寒板痛毒清消時不消膿時停似有誤字用柴葛白芷以解之有重用蘇葉合真人活命飲解之有受暑而然者用六一散香薷合真人活命飲有房欲反復未潰未膿用獨活合柴葛湯與活命飲既潰既膿用川斷制首烏輕用活命飲有受氣而然者已潰未潰俱用柴胡青皮鬱金香附未潰合活命飲已潰輕用受風而反復名為破傷風不治者頗有已潰用楝冬二三錢八珍兼活命飲未潰用黃芩柴葛與活命飲婦人産後不可脫去生化湯胎前帶下黃芩白朮苧麻根不可擅用甲片有白淋者用石羔腐炒黑為引赤淋用鹽滷腐炒黑或用龜板或用烏羔潰後用川斷臺朮大熟地男婦兼血證引加童便一大杯或男人遺精加蓮鬚芡實潰後用連皮建蓮為引有傷魚積青果一枚為引肉積臘肉骨灰加山杏一飯積用麥芽神麯元米積用白酒元酒積用白葛花雞巨子面積用白酒元厚朴芋頭積用陳酒瓜果積用草果麝香又有潰爛時受臭香感觸用羌活合活命飲有食冷復發用半夏陳皮沐浴受觸用柴葛竟有至痰喘氣急者加真杜蘇子三錢炒研枳殼三錢炒毒有高聳而不紅不痛是為陽中陰宜溫解有平塌而極紅極痛腐爛者是謂陰中陽宜清解凡毒至根腳清正四面不痛不硬患處亦軟陽宜清補陰宜溫補一切未潰以實論既潰以虛論又有根腳鬆散紅色甚嬌紅腳甚嫩如嫩肉狀且不疼痛患處雖未潰而亦軟舌上清皎無苔是大虛之證發背雖在未潰一服即用炙黃耆一兩夫補宜循序而進遲補傷元誤補則加痛與其誤補毋寧遲補如人本質不厚因遲補而膿不速者是大約將膿未膿可用生耆三錢漸加炙耆錢許膿出再加炙耆後不用生耆大潰大證耆用至七八錢甚有至一兩者大潰未有不氣血兩虧補氣用參耆補血用熟地補血之陽用當歸丹參毒至潰後補氣而外未有不急補腎水何則腎為水水生木木生火火生土土生金是水為方物之母腎上為命門左為水為水火既濟潰後陽證清補川斷為清補聖藥若當溫補而用川斷小水必蔽結清補至邪盡飲食將復舊必用大熟地溫補至飲食復舊亦可用熟地必用陳酒煮爛每兩加砂仁五六分清補亦用此法制又發背有陰陽虛實夾雜如肉腫瘡不腫者即是虛實夾雜至形狀歪邪根腳模糊突起色白藥不見效是陰陽夾雜初起亦用溫散以觀動靜然後用人參一二分燉汁炒花粉肉桂一二分燉汁炒栝蔞仁余則如常若患處微似青色而人易生怒氣亦用桂制栝蔞仁如潰後煩怒用桂一二分燉汁拌炒白芍妙凡毒軟為虛硬為實更有腫脹不軟而亦不痛是邪在血分重用荊芥以疏血分之邪紅色過赤而老是血分之火用荊芥穗一二錢鹽水炒黑潰後精神弱不成寐用遠志肉開水泡白茯神酸棗仁不效再引用龍眼肉氣血弱潰不收用萸肉錢外或二錢加炭白朮白芍土炒大便不實弱而不實色呆白腹不痛人懶倦用升麻數分白扁豆二三錢炒焦厚朴杜仲鹽水炒二三錢實而不食心口痛氣飽用藥隨所食之物以消之若痢疾胸氣不寬用炒枳殼重則佛手青皮加廣木香厚朴痢退亦用升麻以提其陽使之清升濁降用白扁豆以補其脾再後用杜仲以佐其火小便閉用車前二三株或蔗漿以利之忌食發物及生冷洗浴勞動傷悲氣憤遇寡婦最宜解鬱毒楚難禁用炒整甲片將石膏腐包好煮滾以平其燥烈之氣治病必從其本食冷反復輕則用砂仁以醒胃重則用半夏以燥胃病雖有萬殊救藥及反復總歸一本附謝氏外科祕法辨證色紅而高腫按之而即痛者為陽色白而平板按之而不痛者為陰色浮淡而根腳模糊為虛色沉著而根盤清正為實色淡白青而板者為寒色深紅紫而痛者為熱審而治之斯為得矣治訣補則死攻則亡調和六腑最為良治法凡初起但用攻發消去即了不必補托若將作膿方可內托見證伏陰證外軟內硬按之而後痛者伏陽證外硬內軟按之即痛者半陰半陽證或外軟內硬而按之即痛或內軟外硬按之而反不痛或形屬陽而色屬陰或色屬陽而形反屬陰是皆陰陽錯亂治無適從法宜調和臟腑燮理陰陽皆用制甘草為君祕傳君相通神審證之輕重投劑之大小慎勿誤投自取背戾大劑大甘草一兩栝蔞仁八錢甲片四錢中劑大甘草八錢栝蔞仁六錢甲片三錢小劑大甘草六錢栝蔞仁四錢甲片二錢更重者加金銀子左三十五粒右四十粒日輕夜重者加炒黑荊芥二錢極痛而不大便者加炒黑大黃二錢肉內陷者花粉用人參制色青紫者栝蔞仁用肉桂制噁心者加開口椒四十九粒凡初起方大貝二錢白芷一錢花粉三錢大甘草六錢栝蔞仁四錢炒研甲片二錢炒研葛根一錢丹參一錢殭蠶一錢炒研蘇葉一錢五分左加柴胡一錢右加桔梗七分加酒一大杯蔥頭三個角針三分伏陰證純陰證內外板硬白而不大腫按而不大痛覺同負重如磨是皆重證蘇葉一錢大貝二錢研白芷一錢五分花粉三錢葛根二錢丹參一錢純陰證可不用要用荊芥二錢左加柴胡一錢右加桔梗七分大甘草一兩制栝蔞仁八錢炒研甲片六錢炒研殭蠶一錢炒研澤蘭四錢純陰證可不用伏陰證必用角針三分荊芥一錢加引同前伏陰證大甘草八錢栝蔞仁六錢甲片四錢澤蘭六錢余與前同半陰半陽證宜調和六腑大甘草一兩制栝蔞仁八錢甲片六錢澤蘭八錢丹參三錢余藥同前若勢減收功手按之而軟者加芎歸芍地苓耆人參若硬者仍帶攻發宜加金銀子引同前托膿左柴胡一錢右桔梗七分防風一錢生黃耆一錢毒甚者不可用大貝二錢花粉三錢白芷一錢葛根二錢大甘草四錢栝蔞仁二錢炒甲片一錢炒殭蠶一錢炒有膿即去丹參一錢澤蘭三錢加引同前如有風寒加蘇葉一錢腐肉脫後膿後未脫腐肉少用參耆勿要攻發防風一錢花粉三錢大貝二錢丹參三錢有人參可不用大甘草六錢甲片一錢炒全軟不用左柴胡一錢右桔梗七分栝蔞仁四錢黃耆生熟各二錢澤蘭五錢白茯苓二錢川芎八分當歸一錢酒炒白芍一錢酒炒大生地二錢酒炒腐肉未去不可用此藥服之若痛即用發散藥按之而根腳硬者去人參芎歸芍地若不硬熟地黃耆逐日可加甘草栝蔞仁甲片逐日可減全要性靈心活切勿呆板引同收功防風一錢黃耆四錢蜜炙大貝二錢花粉二錢大熟地三錢炙川芎八分當歸一錢酒炒大甘草二錢炙白茯苓三錢有人參不可用白芍一錢酒炒澤蘭五錢外用陳玉紅膏和陳香油調勻搽引薑一片棗三枚否則桂圓肉五枚若不思飲食熟地少用甘草用生加砂仁炒穀芽引用煨薑忌口除食蝦蟹鰻牛韭筍生冷及洗浴行房余概勿忌收金銀子法秋分前後三日俱好制甘草法揀極大者春分日大河內潮水浸一晝夜取出陰乾用制栝蔞法用好肉桂切細和水入粗瓷器內煎滾即入栝蔞子煎十數沸取出去肉桂渣研用制花粉法將人參煎水再入花粉同煎十數沸取用附對口方在左者柴胡一錢五分葛根二錢荊芥二錢升麻八分川芎一錢二分桔梗一錢二分花粉三錢甲片二錢炒栝蔞仁三錢炒獨活一錢大甘草四錢蘇葉一錢青皮一錢加酒一杯蔥頭三個去須若在右者去柴胡川芎青皮加枳殼或陳皮亦可引經藥官桂流注用是寒證皆宜發背勿用殭蠶炒消腫用膿後不可用羌活兩太陽用獨活托腮後髮際右腰下兩頰皆用薄荷髮際下用白蒺藜左腰下用白芷額角用去寒濕消毒止痛辟邪發背流注用初起皆用蒼朮流注及諸般濕證皆用發背勿用乳香對口初起用又消一切無名腫毒並止痛沒藥功同乳香秦艽舒筋散厥陰之風藁本頭項痛乾薑流注用破故紙臍右用熱證忌製附子流注用益智仁臍左用白芥子流注用溫脾肺知母右顴用寒肺胃角針能引諸藥直達瘡所有膿即止川芎左肩項俱用大甘草生用調和六腑並去大腸火毒收功用炙熟升麻兩肩用五分多至七分兩項用七分多至九分頭上用一錢甘草梢龜頭用防風四肢用右肩腿皆用發背膿後外托尤宜陳皮對口左邊可用發背大忌人參膿後用必須兼防風腐肉盡脫去可大用牛膝性善下且舒筋左足用鬱金解鬱黃芩凡大毒慘痛者用發背用其寒涼傷胃也木瓜舒筋走右足蘇葉發汗用受寒者必用能溫肺用在初起苡仁米走右足花粉發背必用若虛而內陷者要人參水制能消火消毒甲片炙研攻利必用之聖藥槐頭食指桑頭大指楊頭無名指中指小指楊須足指大貝拔毒必用之聖藥澤蘭葉調和氣血膿前少用膿後收功大用可至八錢地松根兩足黃耆毒前不能輕用托膿時用生潰時半生半蜜炙腐盡收功全蜜炙大黃炒黑發背紅紫色痛不止而不大便者用二錢栝蔞仁必用之藥若發背對口青紫者用肉桂水制荊芥肩項用炒焦用發背對口日輕夜重並治血氣下陷溫散生用要藥葛根發背伏陰伏陽皆用開口椒閉口者有毒不可用治噁心用四十九粒麻黃流注用發汗必須枳殼對口右邊用心隔不寬飲食不消俱可用桔梗上升下降在右者尤宜腰上七分腰下四分乳膀上一錢項以上一錢二分凡毒在乳膀以上者不論左右俱可用柴胡在左者俱可用青紫色者是肝病不論左右皆用腰下五分腰上至肩一錢左顴一錢五分三七活血治傷土方八善走骨節治一切無名腫毒引經藥所不能到者左顴用去肺火發背對口紅紫色者用一錢金毛狗脊尻骨用尻即尾樁骨萆薢左腰下用丹參調經脈漢防己右腰下用桂枝兩手用性溫散寒證宜熱證不可金銀藤四肢用性清涼熱證不可金銀花清涼拔毒兼走四肢海桐皮腿用生地涼血補陰當歸活血歸尾破血鮮生地涼血大熟地大補陰分虛者收功可用鮮首烏排膿止痛皂莢炒去筋研敷流注痰毒一切無名腫毒之聖藥青皮對口有邊用發背大忌以上諸藥皆祕授引經要品宜熟讀本草究其功用詳審證之虛實寒熱而斟酌以治之自當以運化無窮動輒取效也熏方三角楓一兩白桑皮五錢上二味為末紙卷藥燒煙燻之俟毒水惡膿盡出其毒自消敷藥方獨腳龍鬚草炙研為末每兩加陳小粉五錢和勻米醋調敷干則以醋潤之換時用豬肉湯洗去凡毒初起用此方如久不收口以前方熏洗熏過將肉湯洗淨拭乾以龍鬚草散干糝之外以太乙膏蓋之第一方甘草一兩花粉五錢大貝二錢五分角針三錢五分甲片七片蛤粉炒川椒左右輕重用栝蔞一個白芷一錢二分加乳香沒藥各一錢二分烏金子五錢三味共研細末待藥熱時沖服水酒各半煎服一帖在上者加防風桂枝桔梗各一錢中間者加川芎二錢五分在下者加牛膝木瓜各一錢二分蔥頭三個第二方甲片六分蛤粉炒甘草節六分歸尾一錢白芷六分角針八分金銀花三錢赤芍六分花粉八分川椒三十六粒烏金子五錢防風六分陳皮三錢乳香六分沒藥六分大棗七個水酒煎服二帖重則三帖第三方兌金丸大龜板一斤洗淨陳酒一斤米醋一杯川蜜一杯上藥以炭火炙碎三汁完取研末以粽米為丸如豆大服三錢如欲速愈加至五錢每日早晚兩服服至十二兩全愈第四方黃金碧玉膏長肉生肌止痛白占一兩黃占五錢頭髮五錢歸身五錢如痛加乳香沒藥各一錢五分肉桂三錢研大附子三錢研此二味陽毒不用若陰毒久不收口塌陷者加入如神上藥用麻油陸兩以頭髮先熬枯去渣再下歸身熬枯去渣後下黃白占待化開再下乳香沒藥二味化開和勻凡毒不久收不長肉以此膏敷之外以好膏藥蓋之或油紙亦可一至晝夜以豬蹄湯洗去三換三次而愈第五方去腐萬金丹巴豆不拘多少先洗去白膜再以好酒煮一枝香取出去油炙乾為細末凡毒有壞肉處以此藥將藥籮篩篩上再貼前膏一晝夜其腐肉盡去矣收口末藥方象皮五分炙研芙蓉葉一錢炙肉桂二分金銀子五分炙乳香四分黃白占各二分沒藥四分冰片二分共研細末摻之附楊州存濟堂藥局膏藥方雲臺膏一名夔膏言一已足也此膏寒熱攻補並用初起能消已成能潰已潰能提毒儘自斂不必服解表托裡之藥亦不假刀針升降丹藥捻等物始終此只一膏極為簡便神速重證外加糝藥敷藥助之已驗過數萬人無不愈者且能定痛可以服食故元氣不傷虛人無補亦能收功通治發背搭手對口發疽頸核乳癰肚癰腰癰一切無名腫毒附骨流注與惡毒頑瘡蛇犬傷等證凡屬陽者並治即半陰半陽之證亦治療毒加拔疔藥貼陰疽勿用孕婦酌用生大黃五兩木鱉仁三兩元參生地忍冬藤生甘草節南薄荷土貝母朴硝各二兩生黃耆當歸各一兩六錢茅蒼朮羌活獨活防風連翹香附烏藥陳皮青皮天花粉川芎白芷山梔赤芍苦杏仁桃仁生草烏生川烏生南星生半夏生黃柏黃連細辛五倍子殭蠶生山甲蜈蚣全蠍露蜂房有子者佳黃芩蟬蛻蛇蛻乾地龍蟾皮生牡蠣皂角紅花萆麻仁各一兩萆麻仁或用三兩發團二兩四錢擬增甘遂大戟延胡靈脂遠志鬱金荊芥蒲黃各一兩原有蜘蜘七個生薑蔥白大蒜頭各四兩槐枝柳枝桑枝各八兩蒼耳子全株鳳仙草全株新增野紫蘇背青面紅者是紫地丁益母草鮮者每株約一斤乾者用二兩石菖蒲二兩川椒一兩共用小磨麻油三十斤凡干藥一斤用油三斤鮮藥一斤用油一斤零分兩起熬枯去渣再並熬俟油成油宜老仍分兩起下丹免火旺走丹每淨油一斤用炒丹七兩收再下鉛粉炒一斤淨松香八兩金陀僧陳石灰炒黃蠟各四兩漂銅録枯礬生礬銀硃掃盆粉明雄制乳香制沒藥官桂丁香樟腦蘇合油各一兩擬增白芥子五錢廣木香一兩牛膠四兩酒蒸化俟丹收後攪至溫溫以一滴試之不爆方下再攪千餘適令勻愈多愈妙勿炒待砂珠無力且不黏也麝香酌加諸膏皆照此熬法如油少酌加二三斤亦可凡熬膏總以不老不嫩合用為貴附烏龍錠子敷藥初起敷之自散已潰敷之不走且在於拔膿收口始終可用並敷痰飲流注跌打損傷大黃八兩五倍子花粉香附子木鱉仁芙蓉葉萆麻仁益母草霜桑葉蒼耳草灰皮硝雄黃陳石灰白芨各四兩蒼朮黃柏川烏草烏羌活獨活生南星生半夏川芎細辛赤芍白芷甘遂大戟山慈菰各二兩共曬研末用醋二十斤用皂角淨肉一斤明礬四兩先熬去渣下炒黑陳小粉八斤再熬俟乾溼合用傾在淨桌上即以前三十味藥末及榆面一斤和入擦勻為錠臨用醋磨敷熱加豬膽汁寒加蔥薑汁擬增延胡烏藥當歸薑黃鬱金石菖蒲苦葶藶黃連防風炮甲各二兩乳香沒藥木香白膠香各四兩附龍虎散糝藥治腫毒用少許糝雲臺膏貼能消能潰能提能斂亦始終皆可用明雄黃五錢土貝母萆麻仁去油木鱉仁各四錢大蜈蚣十條蟾酥三錢大全蠍七個大川山甲七片殭蠶七條露峰房有子者佳三錢大蜘蛛二個腿腳要全鳳仙子二十四粒硃砂輕粉制乳香制沒藥炒鉛粉炒黃丹寒水石磁石硼砂漂銅録牙皂母丁香樟腦黃蠟白臘延胡白芷決明各二錢枯礬五分研擬增草烏南星各二錢蟬蛻蛇蛻各一錢共為末糝貼證重多加犀黃麝冰和糝已長新肉加桃花散黃丹石膏共研末和糝免痛附拔疔黃丸子古用草烏南星草霜巴霜雄朱鬱金輕粉蟾酥蟬蛻全蠍皂麝之類松香提淨白者二兩萆麻仁四兩石上同捶捻爛入銀硃明雄輕粉各三錢漂黃丹五錢蜈蚣三條全蠍三個蟾酥二錢共研末扯拔千遍再加蝸牛或蟾肝搗爛同扯令勻加冰片麝香各五分捏成小丸子如緑豆大黏膏上貼瘡頭外圈烏龍錠過二三日揭看有長條硬膿出即疔根也如紅絲疔將磁鋒於絲走處寸寸割斷再貼指頭疔以雄豬膽入藥套之唇疔用糯米飲搗藥貼並刺委中穴疔出後用龍虎散收功或加細辛能通疔竅一錢蜘蛛一個山甲三片共為丸白芨磨黃連水調化敷之上方得自維揚按方配合百試百驗樂善君子量力捐資熬膏合藥廣為施送亦利濟之一術也因念鄉居僻壤每多外證猝然患之方藥不便就醫於城或缺盤費或惜工夫遷延時日致不可救良可慨也其來城者又覆冒暑熱觸風寒輕證變為重證往往有之何如各鄉鎮市集資配送最為方便但須精選藥材如法泡製方能奏效所治各證以雲臺膏為主附列三方以佐之如鄉間制辦一時難得熟手或請醫局代合或至揚州存濟堂藥局購辦成膏自行攤送均無不可好善樂施君子諒有同心焉師古齋主人識
