front:
  text: 謝氏發背對口治訣論序發背對口治訣先大父邃喬公所著也先大父性穎悟好讀書常以濟世為念敦學不怠屢困棘闈及先伯父香伯公舉於鄉始無意進取惟讀書以自娛暇則講求岐黃曰士不能得志是亦濟世之一道也通內外科多所闡發每視病必矜重四方延請雖遠必至卻饋遺貧困者以藥助之嘗為人治發背對口諸證以古人之法投之多不效沉思其故曰是非古人之欺我也特未通其變耳夫一證之成其受病必有偏重之處審其所偏重而切治則效可立見也自是凡治此證必辨其位之左右上下色之赤白深淺脈之浮沉遲速以審其經絡腑臟竅穴之所繫與夫陰陽虛實淫郁燥濕之所歸而復參之天時相其地宜以制五行生剋之用取古人之法損益變化以通之於是所治罔不效既而先伯父迎養琴江署舍多暇乃取歷年醫案裁定發背對口治訣幾卷附録經驗幾卷及歸而授之先君曰此書未經人道勿輕視之藝雖小亦足以濟世矣先君東環公暨先叔父東揆公亦皆以儒術通素理先君久戰北闈未遑展施先叔父以是道行世善用先大父遺法故所治多奇而中今先君先叔父相繼逝世矣為與諸弟皆材劣不能通一藝先人之書具在徒使置而勿用是先人濟世之志至為等而中絶也楊君子逸夙聞是書勉余欹梓余欣然從之庶幾先人遺術傳播四方高明之士鑑而採擇焉未必不有補於世雖未能述先世之事猶不失先世之志也夫道光二十年仲春七日孫翼為謹序
